# Curated milestone / landmark papers per field, from a field's emergence to recent.
# Durable record of "what counts as a milestone". /milestone-papers resolves each seed
# to a real paper at fetch time (arxiv id when given, else title search), dedupes against
# the registry, and ingests non-duplicates tagged foundational with a milestone block.
# A blank/uncertain arxiv id is resolved by search, so it never produces a wrong record.
#
# era: emergence | foundational | expansion | recent
# The computer_use_agents field was expanded by an exhaustive multi-source search
# (web / gui_grounding / os_desktop / mobile / enabler_benchmark_survey sub-areas).

version: 1
fields:
  computer_use_agents:
    topic_group: computer_use_agents
    emergence_year: 2017
    description: 'Agents that operate computers through web, GUI, OS/desktop, and mobile interfaces, plus
      the environments, datasets, grounding models, benchmarks, and surveys that define the field. Sub-areas:
      web, gui_grounding, os_desktop, mobile, enabler_benchmark_survey.'
    seeds:
    - title: 'GAIA: a benchmark for General AI Assistants'
      year: 2023
      era: emergence
      arxiv: '2311.12983'
      subarea: enabler_benchmark_survey
      significance: General-assistant benchmark (browsing, files, tools); de facto target for OS/desktop-style
        autonomous assistants.
    - title: 'AssistGUI: Task-Oriented Desktop Graphical User Interface Automation'
      year: 2023
      era: emergence
      arxiv: '2312.13108'
      subarea: os_desktop
      significance: Early desktop GUI automation benchmark (100 tasks, 9 Windows apps) with Actor-Critic
        agent; first to stress real productivity software.
    - title: 'Pix2Struct: Screenshot Parsing as Pretraining for Visual Language Understanding'
      year: 2022
      era: emergence
      arxiv: '2210.03347'
      subarea: gui_grounding
      significance: Pretrains image-to-text by parsing masked screenshots into HTML; pioneered pixel-only
        screen understanding reused by GUI VLMs.
    - title: 'AndroidEnv: A Reinforcement Learning Platform for Android'
      year: 2021
      era: emergence
      arxiv: '2105.13231'
      subarea: mobile
      significance: DeepMind RL environment exposing a real Android device via touchscreen + pixels; foundational
        device-control platform.
    - title: Mapping Natural Language Instructions to Mobile UI Action Sequences
      year: 2020
      era: emergence
      arxiv: '2005.03776'
      subarea: mobile
      significance: Seq2Act + PixelHelp; first to ground NL instructions to mobile UI action sequences,
        founding the task.
    - title: Reinforcement Learning on Web Interfaces Using Workflow-Guided Exploration
      year: 2018
      era: emergence
      arxiv: '1802.08802'
      subarea: web
      significance: Introduced MiniWoB++ and workflow-guided exploration; canonical RL-era web benchmark.
    - title: 'World of Bits: An Open-Domain Platform for Web-Based Agents'
      year: 2017
      era: emergence
      arxiv: ''
      subarea: web
      significance: First open-domain platform/benchmark (incl. MiniWoB) for low-level keyboard/mouse
        web actions; founded the field.
    - title: 'SeeClick: Harnessing GUI Grounding for Advanced Visual GUI Agents'
      year: 2024
      era: foundational
      arxiv: '2401.10935'
      subarea: gui_grounding
      significance: GUI-grounding pretraining for screenshot-only agents; created ScreenSpot, first realistic
        cross-platform grounding benchmark.
    - title: 'ScreenAI: A Vision-Language Model for UI and Infographics Understanding'
      year: 2024
