title: A data-driven approach for learning to control computers
authors:
- P. Humphreys
- David Raposo
- Tobias Pohlen
- Gregory Thornton
- Rachita Chhaparia
- Alistair Muldal
- Josh Abramson
- Petko Georgiev
- Alex Goldin
