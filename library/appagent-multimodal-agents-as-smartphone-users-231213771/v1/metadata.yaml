abstract: Recent advancements in large language models (LLMs) have led to the creation of intelligent
  agents capable of performing complex tasks. This paper introduces a novel LLM-based multimodal agent
  framework designed to operate smartphone applications. Our framework allows the agent to mimic human-like
  interactions such as tapping and swiping through a simplified action space, eliminating the need for
  system back-end access and enhancing its versatility across various apps. Central to the agent’s functionality
  is an innovative in-context learning method, where it either autonomously explores or learns from human
  demonstrations, creating a knowledge base used to execute complex tasks across diverse applications.
  We conducted extensive testing with our agent on over 50 tasks spanning 10 applications, ranging from
  social media to sophisticated image editing tools. Additionally, a user study confirmed the agent’s
  superior performance and practicality in handling a diverse array of high-level tasks, demonstrating
  its effectiveness in real-world settings. Our project page is available at https://appagent-official.github.io/.
