abstract: 'With the advancement of Multimodal Large Language Models (MLLM), LLM-driven visual agents are
  increasingly impacting software interfaces, particularly those with graphical user interfaces. This
  work introduces a novel LLM-based multimodal agent framework for mobile devices. This framework, capable
  of navigating mobile devices, emulates human-like interactions. Our agent constructs a flexible action
  space that enhances adaptability across various applications including parser, text and vision descriptions.
  The agent operates through two main phases: exploration and deployment. During the exploration phase,
  functionalities of user interface elements are documented either through agent-driven or manual explorations
  into a customized structured knowledge base. In the deployment phase, RAG technology enables efficient
  retrieval and update from this knowledge base, thereby empowering the agent to perform tasks effectively
  and accurately. This includes performing complex, multi-step operations across various applications,
  thereby demonstrating the framework''s adaptability and precision in handling customized task workflows.
  Our experimental results across various benchmarks demonstrate the framework''s superior performance,
  confirming its effectiveness in real-world scenarios. Our code will be open source soon.'
