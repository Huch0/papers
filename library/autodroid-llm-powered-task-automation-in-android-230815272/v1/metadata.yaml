title: 'AutoDroid: LLM-powered Task Automation in Android'
authors:
- Hao Wen
- Yuanchun Li
- Guohong Liu
- Shanhui Zhao
- Tao Yu
- Toby Jia-Jun Li
- Shiqi Jiang
