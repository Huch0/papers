title: 'Ferret-UI 2: Mastering Universal User Interface Understanding Across Platforms'
authors:
- Zhangheng Li
- Keen You
- Haotian Zhang
- Di Feng
- Harsh Agrawal
- Xiujun Li
- M. Moorthy
- Jeff Nichols
