title: 'GUIOdyssey: A Comprehensive Dataset for Cross-App GUI Navigation on Mobile Devices'
authors:
- Quanfeng Lu
- Wenqi Shao
- Zitao Liu
- Fanqing Meng
- Boxuan Li
- Botong Chen
- Siyuan Huang
- Kaipeng Zhang
- Yu Qiao
- Ping Luo
abstract: Autonomous Graphical User Interface (GUI) navigation agents can enhance user experience in communication,
  entertainment, and productivity by streamlining workflows and reducing manual intervention. However,
  prior GUI agents often trained with datasets comprising tasks that can be completed within a single
  app, leading to poor performance in cross-app navigation. To address this problem, we present GUIOdyssey,
  a comprehensive dataset for crossapp mobile GUI navigation. GUIOdyssey comprises 8,334 episodes with
  an average of 15.3 steps per episode, covering 6 mobile devices, 212 distinct apps, and 1,357 app combinations.
  Each step is enriched with detailed semantic reasoning annotations, which aid the model in building
  cognitive processes and enhancing its reasoning abilities for complex cross-app tasks. Building on GUIOdyssey,
  we develop OdysseyAgent, an exploratory multimodal agent for long-step cross-app navigation equipped
  with a history resampler module that efficiently attends to historical screenshot tokens, balancing
  performance and inference speed. Extensive experiments conducted in both in-domain and out-of-domain
  scenarios validate the effectiveness of our approach. Moreover, we demonstrate that historial information
  involving actions, screenshots and context in our dataset can significantly enhances OdysseyAgent's
  performance on complex cross-app tasks.
