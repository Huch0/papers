title: 'OS-ATLAS: A Foundation Action Model for Generalist GUI Agents'
authors:
- Zhiyong Wu
- Zhenyu Wu
- Fangzhi Xu
- Yian Wang
- Qiushi Sun
- Chengyou Jia
- Kanzhi Cheng
- Zichen Ding
