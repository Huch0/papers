version_key: v1
title: 'ScreenSpot-Pro: GUI Grounding for Professional High-Resolution Computer Use'
authors:
- Kaixin Li
- Ziyang Meng
- Hongzhan Lin
- Ziyang Luo
- Yuchen Tian
- Jing Ma
- Zhiyong Huang
- Tat-Seng Chua
abstract: Recent advancements in Multi-modal Large Language Models (MLLMs) have led to significant progress
  in developing GUI agents for general tasks such as web browsing and mobile phone use. However, their
  application in professional domains remains under-explored. These specialized workflows introduce unique
  challenges for GUI perception models, including high-resolution displays and complex environments which
  lead to smaller target sizes. In this paper, we introduce ScreenSpot-Pro, a new benchmark designed to
  rigorously evaluate the grounding capabilities of MLLMs in high-resolution professional settings. The
  benchmark comprises authentic high-resolution images from a variety of professional domains with expert
  annotations. It spans 23 applications across five industries and three operating systems. Existing GUI
  grounding models perform poorly on this dataset, with the best model achieving only 18.9%. Our experiments
  reveal that strategically reducing the search area enhances accuracy. Based on this insight, we propose
  ScreenSeekeR, a visual search method that utilizes the GUI knowledge of a strong planner to guide a
  cascaded search, achieving state-of-the-art performance with 48.1% without any additional training.
  We hope that our benchmark and findings will advance the development of GUI agents for professional
  settings.
