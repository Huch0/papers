title: 'SpreadsheetBench: Towards Challenging Real World Spreadsheet Manipulation'
authors:
- Zeyao Ma
- Bohan Zhang
- Jing Zhang
- Jifan Yu
- Xiaokang Zhang
- Xiaohan Zhang
- Sijia Luo
- Xi Wang
- Jie Tang
abstract: We introduce SpreadsheetBench, a challenging spreadsheet manipulation benchmark exclusively
  derived from real-world scenarios, designed to immerse current large language models (LLMs) in the actual
  workflow of spreadsheet users. Unlike existing benchmarks that rely on synthesized queries and simplified
  spreadsheet files, SpreadsheetBench is built from 912 real questions gathered from online Excel forums,
  which reflect the intricate needs of users. The associated spreadsheets from the forums contain a variety
  of tabular data such as multiple tables, non-standard relational tables, and abundant non-textual elements.
  Furthermore, we propose a more reliable evaluation metric akin to online judge platforms, where multiple
  spreadsheet files are created as test cases for each instruction, ensuring the evaluation of robust
  solutions capable of handling spreadsheets with varying values. Our comprehensive evaluation of various
  LLMs under both single-round and multi-round inference settings reveals a substantial gap between the
  state-of-the-art (SOTA) models and human performance, highlighting the benchmark's difficulty.
