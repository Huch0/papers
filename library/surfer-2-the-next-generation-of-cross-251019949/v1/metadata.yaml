abstract: Building agents that generalize across web, desktop, and mobile environments remains an open
  challenge, as prior systems rely on environment-specific interfaces that limit cross-platform deployment.
  We introduce Surfer 2, a unified architecture operating purely from visual observations that achieves
  state-of-the-art performance across all three environments. Surfer 2 integrates hierarchical context
  management, decoupled planning and execution, and self-verification with adaptive recovery, enabling
  reliable operation over long task horizons. Our system achieves 97.1% accuracy on WebVoyager, 69.6%
  on WebArena, 60.1% on OSWorld, and 87.1% on AndroidWorld, outperforming all prior systems without task-specific
  fine-tuning. With multiple attempts, Surfer 2 exceeds human performance on all benchmarks. These results
  demonstrate that systematic orchestration amplifies foundation model capabilities and enables general-purpose
  computer control through visual interaction alone, while calling for a next-generation vision language
  model to achieve Pareto-optimal cost-efficiency.
